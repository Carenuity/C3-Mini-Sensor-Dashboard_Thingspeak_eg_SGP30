[env:lolin_c3_mini]
platform = espressif32
board = lolin_c3_mini
framework = arduino
lib_deps = 
	adafruit/Adafruit SGP30 Sensor@^2.0.3
	adafruit/Adafruit NeoPixel@^1.15.4
	adafruit/Adafruit GFX Library@^1.12.5
	adafruit/Adafruit SSD1306@^2.5.16
